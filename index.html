<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gold Tracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .gold-header { background: linear-gradient(135deg, #d97706 0%, #b45309 100%); }
        .card { background: white; border-radius: 1.25rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="text-slate-800">

    <header class="gold-header text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto flex justify-between items-center max-w-md">
            <h1 class="text-xl font-bold italic">🟡 Gold Tracker</h1>
            <div class="flex gap-2">
                <button onclick="showPage('index')" class="text-sm px-3 py-1.5 rounded-full active:bg-white/20">หน้าแรก</button>
                <button onclick="showPage('form')" class="bg-white text-amber-700 px-4 py-1.5 rounded-full font-bold text-sm shadow-sm active:scale-95 transition">ซื้อทอง</button>
            </div>
        </div>
    </header>

    <main class="container mx-auto p-4 max-w-md space-y-4">
        
        <script>
            const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyWO5r9liTWZrcJcjhD9LtgW3f1TW7gTsbct6RnIGfqpxH-7z3ofEIVRBj7fdyN5iru_w/exec";
        </script>

        <div id="page-index" class="space-y-4">
            <section class="card p-5 text-center border-b-4 border-blue-500">
                <h3 class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">ราคาทองวันนี้ (ระบบจะจำค่านี้)</h3>
                <input type="number" id="currentGoldPrice" onchange="updatePriceToServer()" oninput="calculateRealtime()" 
                    class="text-4xl font-bold w-full text-center outline-none text-blue-600 bg-blue-50/50 rounded-2xl py-2">
            </section>

            <section class="grid grid-cols-2 gap-3">
                <div class="card p-4 text-center border-b-4 border-emerald-500">
                    <h3 class="text-[10px] text-slate-400 font-bold uppercase mb-1">ทองในมือ</h3>
                    <div class="text-2xl font-bold text-slate-700"><span id="totalWeight">0.00</span></div>
                    <p class="text-[10px] text-slate-400">บาท</p>
                </div>
                <div id="profitCard" class="card p-4 text-center border-b-4 border-slate-300">
                    <h3 class="text-[10px] text-slate-400 font-bold uppercase mb-1">รวมกำไร</h3>
                    <div class="text-2xl font-bold"><span id="totalProfit">0.00</span></div>
                    <p class="text-[10px] text-slate-400">บาท</p>
                </div>
            </section>

            <div class="flex justify-between items-center px-1">
                <h2 class="font-bold text-slate-700">📦 รายการทอง</h2>
                <button onclick="loadData()" class="text-xs font-bold text-blue-600">🔄 รีเฟรช</button>
            </div>
            
            <div id="inventoryContainer" class="space-y-3 pb-10">
                <div class="text-center py-10 text-slate-400 italic">กำลังโหลดข้อมูล...</div>
            </div>
        </div>

        <div id="page-form" class="hidden">
            <div class="card p-6 border border-slate-100">
                <h2 class="text-xl font-bold mb-5 text-emerald-700">➕ เพิ่มรายการซื้อ</h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-xs font-bold text-slate-500 ml-1">วันที่ซื้อ</label>
                        <input type="date" id="buyDate" class="w-full border-2 border-slate-50 p-3 rounded-xl outline-none focus:border-emerald-500 bg-slate-50">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-xs font-bold text-slate-500 ml-1">น้ำหนัก (บาท)</label>
                            <input type="number" step="any" id="buyAmount" class="w-full border-2 border-slate-50 p-3 rounded-xl outline-none bg-slate-50" placeholder="0.00">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-slate-500 ml-1">ค่ากำเหน็จ</label>
                            <input type="number" id="buyFee" class="w-full border-2 border-slate-50 p-3 rounded-xl outline-none bg-slate-50" value="0">
                        </div>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-blue-600 ml-1">รายละเอียด (แหวน, สร้อย, แท่ง)</label>
                        <input type="text" id="buyDetail" class="w-full border-2 border-blue-50 p-3 rounded-xl outline-none focus:border-blue-400 bg-blue-50/50" placeholder="จดบันทึกไว้">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-500 ml-1">ราคาต่อบาทที่ซื้อ</label>
                        <input type="number" id="buyPrice" class="w-full border-2 border-slate-50 p-3 rounded-xl outline-none bg-slate-50" placeholder="0.00">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-500 ml-1">หมายเหตุ</label>
                        <input type="text" id="buyNote" class="w-full border-2 border-slate-50 p-3 rounded-xl outline-none bg-slate-50">
                    </div>
                    <button onclick="submitBuy()" id="btnBuy" class="w-full gold-header text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition mt-2">✅ บันทึกข้อมูล</button>
                    <button onclick="showPage('index')" class="w-full text-slate-400 text-sm py-2">ยกเลิก</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let rawData = [];
        function showPage(page) {
            document.getElementById('page-index').classList.toggle('hidden', page !== 'index');
            document.getElementById('page-form').classList.toggle('hidden', page !== 'form');
            window.scrollTo(0,0);
        }
        async function loadData() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                rawData = data.inventory;
                document.getElementById('currentGoldPrice').value = data.lastPrice || 0;
                renderInventory();
            } catch (err) { alert("เกิดข้อผิดพลาดในการดึงข้อมูล"); }
        }
        async function updatePriceToServer() {
            const price = document.getElementById('currentGoldPrice').value;
            fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "savePrice", price: price }) });
        }
        function renderInventory() {
            const container = document.getElementById('inventoryContainer');
            let totalW = 0; container.innerHTML = "";
            if (rawData.length === 0) {
                container.innerHTML = `<div class="card p-10 text-center text-slate-400 italic">ไม่มีทองในคลัง</div>`;
                return;
            }
            rawData.forEach(item => {
                const weight = parseFloat(item["คงเหลือ"]) || 0;
                const buyPrice = parseFloat(item["ราคาต้นทุน/บาท"]) || 0;
                totalW += weight;
                const card = document.createElement('div');
                card.className = "card p-4 flex justify-between items-center border border-slate-50";
                card.innerHTML = `
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-[9px] bg-slate-100 px-2 py-0.5 rounded text-slate-500 font-bold tracking-tighter">${item["Lot ID"]}</span>
                            <span class="text-[10px] text-slate-400">${item["วันที่ซื้อ"]}</span>
                        </div>
                        <h3 class="font-bold text-slate-800">${item["รายละเอียด"] || "ไม่มีชื่อ"}</h3>
                        <div class="flex gap-4 text-[10px]">
                            <span class="text-slate-400 italic">ทุน: ${buyPrice.toLocaleString()}</span>
                            <span class="text-blue-600 font-bold">เหลือ: ${weight} บาท</span>
                        </div>
                    </div>
                    <div class="flex flex-col items-end">
                        <div id="diff-${item["Lot ID"]}" class="text-sm font-black mb-2">-</div>
                        <button onclick="sellPopup('${item["Lot ID"]}', ${weight})" class="bg-rose-500 text-white px-5 py-1.5 rounded-full text-xs font-bold active:scale-90 transition shadow-sm">ขาย</button>
                    </div>
                `;
                container.appendChild(card);
            });
            document.getElementById('totalWeight').innerText = totalW.toFixed(4);
            calculateRealtime();
        }
        function calculateRealtime() {
            const current = parseFloat(document.getElementById('currentGoldPrice').value) || 0;
            let totalProfit = 0;
            rawData.forEach(item => {
                const buyPrice = parseFloat(item["ราคาต้นทุน/บาท"]) || 0;
                const weight = parseFloat(item["คงเหลือ"]) || 0;
                const profit = (current - buyPrice) * weight;
                totalProfit += profit;
                const diffEl = document.getElementById(`diff-${item["Lot ID"]}`);
                if(diffEl) {
                    diffEl.innerHTML = `<span class="${profit >= 0 ? 'text-emerald-500' : 'text-rose-500'}">${profit >= 0 ? '+' : ''}${Math.round(profit).toLocaleString()}</span>`;
                }
            });
            const pSum = Math.round(totalProfit);
            document.getElementById('totalProfit').innerText = pSum.toLocaleString();
            document.getElementById('profitCard').className = `card p-4 text-center border-b-4 transition-colors ${pSum >= 0 ? 'border-emerald-400 text-emerald-600' : 'border-rose-400 text-rose-600'}`;
        }
        async function submitBuy() {
            const btn = document.getElementById('btnBuy');
            const weight = document.getElementById('buyAmount').value;
            const price = document.getElementById('buyPrice').value;
            const date = document.getElementById('buyDate').value;
            if(!weight || !price || !date) return alert("กรุณากรอกข้อมูลให้ครบ");
            btn.disabled = true; btn.innerText = "⏳ บันทึกข้อมูล...";
            const payload = {
                action: "buy", date: date, amount: weight, detail: document.getElementById('buyDetail').value,
                price: price, fee: document.getElementById('buyFee').value || 0, note: document.getElementById('buyNote').value
            };
            await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
            alert("✅ สำเร็จ!"); location.reload();
        }
        async function sellPopup(lotId, max) {
            const amount = prompt(`ขายจากล็อต ${lotId} (สูงสุด ${max})`, max);
            if(amount === null || amount === "" || amount <= 0 || amount > max) return;
            const price = prompt(`ระบุราคาที่ขายได้จริงต่อบาท:`, document.getElementById('currentGoldPrice').value);
            if(!price) return;
            const payload = { action: "sell", lotId: lotId, sellAmount: amount, sellPrice: price };
            await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
            alert("✅ สำเร็จ!"); location.reload();
        }
        window.onload = loadData;
    </script>
</body>
</html>
