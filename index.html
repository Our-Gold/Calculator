<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gold Smart Tracker v2.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .gold-bg { background: linear-gradient(135deg, #b45309 0%, #d97706 100%); }
        .card { background: white; border-radius: 1.25rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="text-slate-800">

    <header class="gold-bg text-white p-4 sticky top-0 z-50 shadow-lg text-center">
        <h1 class="text-xl font-bold italic tracking-wider uppercase">🟡 Gold Smart Pro</h1>
    </header>

    <main class="container mx-auto p-4 max-w-md space-y-4">
        
        <script>
            const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyWO5r9liTWZrcJcjhD9LtgW3f1TW7gTsbct6RnIGfqpxH-7z3ofEIVRBj7fdyN5iru_w/exec";
        </script>

        <section class="card p-5 text-center border-b-4 border-blue-500 shadow-md">
            <h3 class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">ราคาทองปัจจุบัน (บันทึกอัตโนมัติ)</h3>
            <input type="number" id="currentGoldPrice" onchange="updatePriceToServer()" oninput="calculateRealtime()" 
            class="text-4xl font-bold w-full text-center outline-none text-blue-600 bg-blue-50/50 rounded-2xl py-2">
        </section>

        <section class="grid grid-cols-2 gap-3">
            <div class="card p-3 text-center border-b-4 border-emerald-500">
                <p class="text-[9px] text-slate-400 font-bold uppercase">1. รวมน้ำหนักปัจจุบัน</p>
                <div class="text-xl font-bold text-slate-700"><span id="totalWeight">0.00</span> <small class="text-[10px]">บาท</small></div>
            </div>
            <div class="card p-3 text-center border-b-4 border-purple-500">
                <p class="text-[9px] text-slate-400 font-bold uppercase">2. รวมต้นทุนปัจจุบัน</p>
                <div class="text-xl font-bold text-slate-700 font-mono"><span id="totalCurrentCost">0</span></div>
            </div>
            <div id="profitCard" class="card p-3 text-center border-b-4 border-slate-300">
                <p class="text-[9px] text-slate-400 font-bold uppercase">3. กำไร/ขาดทุนปัจจุบัน</p>
                <div class="text-xl font-bold"><span id="currentProfit">0</span></div>
            </div>
            <div class="card p-3 text-center border-b-4 border-emerald-400">
                <p class="text-[9px] text-emerald-600 font-bold uppercase">4. ขายทำกำไรไปแล้ว</p>
                <div class="text-xl font-bold text-emerald-600 font-mono"><span id="accumulatedProfit">0</span></div>
            </div>
        </section>

        <div class="flex gap-2">
             <button onclick="showPage('index')" class="flex-1 bg-slate-200 text-slate-700 py-3 rounded-xl font-bold text-sm shadow active:scale-95 transition">หน้าแรก</button>
             <button onclick="showPage('form')" class="flex-1 gold-bg text-white py-3 rounded-xl font-bold text-sm shadow-md active:scale-95 transition">เพิ่มข้อมูลซื้อ</button>
        </div>

        <div id="page-index" class="space-y-3">
            <div class="flex justify-between items-center px-1">
                <h2 class="font-bold text-slate-700 text-sm">📋 รายการล็อตทองคงเหลือ</h2>
                <button onclick="loadData()" class="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded">🔄 รีเฟรช</button>
            </div>
            <div id="inventoryContainer" class="space-y-3 pb-10">
                <div class="text-center py-10 text-slate-400 italic">กำลังโหลดข้อมูล...</div>
            </div>
        </div>

        <div id="page-form" class="hidden">
            <div class="card p-6 border border-slate-100 shadow-xl">
                <h2 class="text-xl font-bold mb-6 text-emerald-700 border-b pb-2">➕ บันทึกซื้อทองใหม่</h2>
                <div class="space-y-4">
                    <div><label class="text-[11px] font-bold text-slate-500 ml-1 uppercase">วันที่ซื้อ</label><input type="date" id="buyDate" class="w-full border-2 border-slate-50 p-4 rounded-2xl outline-none focus:border-emerald-500 bg-slate-50"></div>
                    <div><label class="text-[11px] font-bold text-slate-500 ml-1 uppercase">ราคาที่ซื้อบาทละ (ต้นทุน)</label><input type="number" id="buyPrice" class="w-full border-2 border-slate-50 p-4 rounded-2xl outline-none focus:border-emerald-500 bg-slate-50" placeholder="เช่น 35000"></div>
                    <div><label class="text-[11px] font-bold text-slate-500 ml-1 uppercase">น้ำหนักที่ซื้อ (บาท)</label><input type="number" step="any" id="buyAmount" class="w-full border-2 border-slate-50 p-4 rounded-2xl outline-none focus:border-emerald-500 bg-slate-50" placeholder="เช่น 1.00"></div>
                    <div><label class="text-[11px] font-bold text-slate-500 ml-1 uppercase">ค่ากำเหน็จรวม</label><input type="number" id="buyFee" class="w-full border-2 border-slate-50 p-4 rounded-2xl outline-none focus:border-emerald-500 bg-slate-50" value="0"></div>
                    <div><label class="text-[11px] font-bold text-blue-600 ml-1 italic uppercase">รายละเอียด/หมายเหตุ</label><input type="text" id="buyNote" class="w-full border-2 border-blue-50 p-4 rounded-2xl outline-none focus:border-blue-400 bg-blue-50/50" placeholder="ระบุรายการ"></div>
                    <button onclick="submitBuy()" id="btnBuy" class="w-full gold-bg text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition mt-4 text-lg">✅ บันทึกลงฐานข้อมูล</button>
                    <button onclick="showPage('index')" class="w-full text-slate-400 text-sm py-2">ยกเลิก</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let rawData = [];
        let accProfit = 0;

        function showPage(page) {
            document.getElementById('page-index').classList.toggle('hidden', page !== 'index');
            document.getElementById('page-form').classList.toggle('hidden', page !== 'form');
            window.scrollTo(0,0);
        }

        async function loadData() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                rawData = data.inventory;
                accProfit = data.accumulatedProfit;
                document.getElementById('currentGoldPrice').value = data.lastPrice || 0;
                document.getElementById('accumulatedProfit').innerText = Math.round(accProfit).toLocaleString();
                renderInventory();
            } catch (err) { console.error(err); }
        }

        async function updatePriceToServer() {
            const price = document.getElementById('currentGoldPrice').value;
            fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "savePrice", price: price }) });
        }

        function renderInventory() {
            const container = document.getElementById('inventoryContainer');
            let totalW = 0; 
            let totalC = 0;
            container.innerHTML = "";
            
            if (rawData.length === 0) {
                container.innerHTML = `<div class="card p-10 text-center text-slate-400 italic">ไม่มีทองในคลัง</div>`;
            }

            rawData.forEach(item => {
                const weight = parseFloat(item["คงเหลือ"]) || 0;
                const buyPricePerUnit = parseFloat(item["ราคาซื้อ/บาท"]) || 0;
                const totalFee = parseFloat(item["ค่ากำเหน็จ"]) || 0;
                const originalWeight = parseFloat(item["น้ำหนักที่ซื้อ"]) || 0;
                
                // ต้นทุนสัดส่วน = (ราคาซื้อ * น้ำหนักเหลือ) + (ค่ากำเหน็จ * สัดส่วนน้ำหนักเหลือ)
                const currentLotCost = (buyPricePerUnit * weight) + (totalFee * (weight / originalWeight));
                
                totalW += weight;
                totalC += currentLotCost;

                const card = document.createElement('div');
                card.className = "card p-4 flex justify-between items-center border border-slate-50";
                card.innerHTML = `
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-[8px] bg-slate-100 px-2 py-0.5 rounded text-slate-500 font-bold">${item["Lot ID"]}</span>
                            <span class="text-[9px] text-slate-400 font-medium">${item["วันที่ซื้อ"]}</span>
                        </div>
                        <h3 class="font-bold text-slate-800 text-sm">${item["หมายเหตุ/รายละเอียด"] || "ไม่มีชื่อ"}</h3>
                        <div class="mt-2 space-y-1">
                            <div class="flex gap-4 text-[10px]">
                                <span class="text-slate-400 italic">ทุนต่อบาท: ${buyPricePerUnit.toLocaleString()}</span>
                                <span class="text-blue-600 font-bold uppercase tracking-tighter">คงเหลือ: ${weight} บาท</span>
                            </div>
                        </div>
                    </div>
                    <div class="flex flex-col items-end gap-2">
                        <div id="diff-${item["Lot ID"]}" class="text-xs font-black">-</div>
                        <button onclick="sellPopup('${item["Lot ID"]}', ${weight})" class="bg-rose-500 text-white px-4 py-1.5 rounded-xl text-[10px] font-bold shadow active:scale-95 transition">ขาย</button>
                    </div>
                `;
                container.appendChild(card);
            });
            
            document.getElementById('totalWeight').innerText = totalW.toFixed(2);
            document.getElementById('totalCurrentCost').innerText = Math.round(totalC).toLocaleString();
            calculateRealtime();
        }

        function calculateRealtime() {
            const currentPrice = parseFloat(document.getElementById('currentGoldPrice').value) || 0;
            let totalW = 0;
            let totalC = 0;

            rawData.forEach(item => {
                const weight = parseFloat(item["คงเหลือ"]) || 0;
                const buyPricePerUnit = parseFloat(item["ราคาซื้อ/บาท"]) || 0;
                const totalFee = parseFloat(item["ค่ากำเหน็จ"]) || 0;
                const originalWeight = parseFloat(item["น้ำหนักที่ซื้อ"]) || 0;
                
                const currentLotCost = (buyPricePerUnit * weight) + (totalFee * (weight / originalWeight));
                
                totalW += weight;
                totalC += currentLotCost;
                
                const currentLotValue = currentPrice * weight;
                const profitPerLot = currentLotValue - currentLotCost;
                
                const diffEl = document.getElementById(`diff-${item["Lot ID"]}`);
                if(diffEl) {
                    diffEl.innerHTML = `<span class="${profitPerLot >= 0 ? 'text-emerald-500' : 'text-rose-500'}">${profitPerLot >= 0 ? '+' : ''}${Math.round(profitPerLot).toLocaleString()}</span>`;
                }
            });

            const netProfit = (currentPrice * totalW) - totalC;
            const profitEl = document.getElementById('currentProfit');
            profitEl.innerText = Math.round(netProfit).toLocaleString();
            profitEl.className = netProfit >= 0 ? 'text-xl font-bold text-emerald-600 font-mono' : 'text-xl font-bold text-rose-600 font-mono';
            document.getElementById('profitCard').className = `card p-3 text-center border-b-4 transition-colors ${netProfit >= 0 ? 'border-emerald-400' : 'border-rose-400'}`;
        }

        async function submitBuy() {
            const btn = document.getElementById('btnBuy');
            const weight = document.getElementById('buyAmount').value;
            const price = document.getElementById('buyPrice').value;
            if(!weight || !price) return alert("กรุณากรอกข้อมูลให้ครบ");
            btn.disabled = true; btn.innerText = "⏳ กำลังบันทึก...";
            
            const payload = {
                action: "buy", date: document.getElementById('buyDate').value,
                amount: weight, price: price, fee: document.getElementById('buyFee').value || 0,
                note: document.getElementById('buyNote').value
            };
            await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
            alert("บันทึกสำเร็จ!"); location.reload();
        }

        async function sellPopup(lotId, max) {
            const amount = prompt(`ขายจากล็อต ${lotId} (สูงสุด ${max})`, max);
            if(amount === null || amount === "" || amount <= 0 || amount > max) return;
            const price = prompt(`ราคาทองที่ขายได้:`, document.getElementById('currentGoldPrice').value);
            if(!price) return;
            const payload = { action: "sell", lotId: lotId, sellAmount: amount, sellPrice: price };
            await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
            alert("บันทึกการขายสำเร็จ!"); location.reload();
        }
        window.onload = loadData;
    </script>
</body>
</html>
