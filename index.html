<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gold Tracker Pro v1.7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f1f5f9; }
        .gold-gradient { background: linear-gradient(135deg, #b45309 0%, #d97706 100%); }
        .card { background: white; border-radius: 1.25rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); transition: 0.3s; }
    </style>
</head>
<body class="text-slate-800">

    <header class="gold-gradient text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto flex justify-between items-center max-w-md">
            <h1 class="text-lg font-bold italic">🟡 GOLD SMART</h1>
            <div class="flex gap-2 text-xs font-bold">
                <button onclick="showPage('index')" class="px-3 py-2 rounded-lg active:bg-white/20">หน้าแรก</button>
                <button onclick="showPage('form')" class="bg-white text-amber-800 px-4 py-2 rounded-lg shadow-sm">เพิ่มข้อมูล</button>
            </div>
        </div>
    </header>

    <main class="container mx-auto p-3 max-w-md space-y-3">
        
        <script>
            const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyWO5r9liTWZrcJcjhD9LtgW3f1TW7gTsbct6RnIGfqpxH-7z3ofEIVRBj7fdyN5iru_w/exec";
        </script>

        <div id="page-index" class="space-y-3">
            <section class="card p-4 text-center border-b-4 border-blue-500">
                <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">ราคาทองปัจจุบัน (จำค่านี้)</p>
                <input type="number" id="currentGoldPrice" onchange="updatePriceToServer()" oninput="calculateRealtime()" 
                    class="text-4xl font-bold w-full text-center outline-none text-blue-600 bg-blue-50/50 rounded-xl py-2">
            </section>

            <section class="grid grid-cols-2 gap-3">
                <div class="card p-3 text-center">
                    <p class="text-[9px] text-slate-400 font-bold uppercase">ทองคงเหลือรวม</p>
                    <div class="text-xl font-bold text-slate-700"><span id="totalWeight">0.00</span> <small class="text-xs">บาท</small></div>
                </div>
                <div class="card p-3 text-center border-b-4 border-orange-400">
                    <p class="text-[9px] text-slate-400 font-bold uppercase text-orange-600">กำไรที่ขายได้แล้วจริง</p>
                    <div class="text-xl font-bold text-orange-600"><span id="realizedProfit">0</span></div>
                </div>
            </section>

            <div id="profitCard" class="card p-3 text-center border-b-4 border-slate-300">
                <p class="text-[9px] text-slate-400 font-bold uppercase">กำไรคาดการณ์ (หากขายส่วนที่เหลือวันนี้)</p>
                <div class="text-2xl font-bold"><span id="totalProfit">0.00</span></div>
            </div>

            <h2 class="font-bold text-slate-600 px-1 pt-2 flex justify-between items-center text-sm">
                <span>📦 ล็อตทองในมือ</span>
                <button onclick="loadData()" class="text-blue-500 text-xs font-bold">🔄 รีเฟรช</button>
            </h2>
            
            <div id="inventoryContainer" class="space-y-3 pb-20">
                <div class="text-center py-10 text-slate-400 italic">กำลังโหลด...</div>
            </div>
        </div>

        <div id="page-form" class="hidden animate-in fade-in">
            <div class="card p-5">
                <h2 class="text-xl font-bold mb-5 text-emerald-700">➕ บันทึกซื้อทอง</h2>
                <div class="space-y-4">
                    <div><label class="text-xs font-bold text-slate-500">วันที่ซื้อ</label><input type="date" id="buyDate" class="w-full border-2 border-slate-50 p-3 rounded-xl outline-none bg-slate-50"></div>
                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="text-xs font-bold text-slate-500">น้ำหนัก (บาท)</label><input type="number" step="any" id="buyAmount" class="w-full border-2 border-slate-50 p-3 rounded-xl outline-none bg-slate-50" placeholder="0.00"></div>
                        <div><label class="text-xs font-bold text-slate-500">ค่ากำเหน็จ</label><input type="number" id="buyFee" class="w-full border-2 border-slate-50 p-3 rounded-xl outline-none bg-slate-50" value="0"></div>
                    </div>
                    <div><label class="text-xs font-bold text-blue-600">รายละเอียดทอง (เช่น แหวน, แท่ง)</label><input type="text" id="buyDetail" class="w-full border-2 border-blue-50 p-3 rounded-xl focus:border-blue-400 bg-blue-50/30" placeholder="ระบุรายการ"></div>
                    <div><label class="text-xs font-bold text-slate-500">ราคาซื้อ (บาทละ)</label><input type="number" id="buyPrice" class="w-full border-2 border-slate-50 p-3 rounded-xl outline-none bg-slate-50" placeholder="0.00"></div>
                    <button onclick="submitBuy()" id="btnBuy" class="w-full gold-gradient text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition mt-2 italic">✅ บันทึกข้อมูลสำเร็จ</button>
                    <button onclick="showPage('index')" class="w-full text-slate-400 text-sm py-2">ยกเลิก</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let rawData = [];
        let rProfit = 0;
        function showPage(page) {
            document.getElementById('page-index').classList.toggle('hidden', page !== 'index');
            document.getElementById('page-form').classList.toggle('hidden', page !== 'form');
            window.scrollTo(0,0);
        }
        async function loadData() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                rawData = data.inventory;
                rProfit = data.realizedProfit;
                document.getElementById('currentGoldPrice').value = data.lastPrice || 0;
                document.getElementById('realizedProfit').innerText = Math.round(rProfit).toLocaleString();
                renderInventory();
            } catch (err) { alert("เกิดข้อผิดพลาดในการโหลดข้อมูล"); }
        }
        async function updatePriceToServer() {
            const price = document.getElementById('currentGoldPrice').value;
            fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "savePrice", price: price }) });
        }
        function renderInventory() {
            const container = document.getElementById('inventoryContainer');
            let totalW = 0; container.innerHTML = "";
            if (rawData.length === 0) {
                container.innerHTML = `<div class="card p-10 text-center text-slate-400 italic text-sm font-bold tracking-widest uppercase">ไม่มีทองเหลืออยู่ในคลัง</div>`;
                return;
            }
            rawData.forEach(item => {
                const weight = parseFloat(item["คงเหลือ"]) || 0;
                const originalWeight = parseFloat(item["น้ำหนัก"]) || 0;
                const soldWeight = originalWeight - weight;
                const buyPrice = parseFloat(item["ราคาต้นทุน/บาท"]) || 0;
                totalW += weight;
                const card = document.createElement('div');
                card.className = "card p-4 flex justify-between items-center border border-slate-50";
                card.innerHTML = `
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-[8px] bg-slate-100 px-1.5 py-0.5 rounded text-slate-500 font-bold">${item["Lot ID"]}</span>
                            <span class="text-[10px] text-slate-400 font-medium">${item["วันที่ซื้อ"]}</span>
                        </div>
                        <h3 class="font-bold text-slate-800 text-sm">${item["รายละเอียด"] || "ไม่มีชื่อ"}</h3>
                        <div class="mt-2 space-y-1">
                            <div class="flex gap-3 text-[10px]">
                                <span class="text-slate-400">ซื้อมา: <b>${originalWeight}</b></span>
                                <span class="text-rose-400">ขายไป: <b>${soldWeight.toFixed(2)}</b></span>
                            </div>
                            <div class="text-blue-600 font-bold text-xs uppercase tracking-tighter">คงเหลือ: ${weight} บาท</div>
                        </div>
                    </div>
                    <div class="flex flex-col items-end gap-2">
                        <div id="diff-${item["Lot ID"]}" class="text-xs font-black">-</div>
                        <button onclick="sellPopup('${item["Lot ID"]}', ${weight})" class="bg-rose-500 text-white px-4 py-1.5 rounded-xl text-[10px] font-bold shadow active:scale-90 transition">ขาย</button>
                    </div>
                `;
                container.appendChild(card);
            });
            document.getElementById('totalWeight').innerText = totalW.toFixed(4);
            calculateRealtime();
        }
        function calculateRealtime() {
            const current = parseFloat(document.getElementById('currentGoldPrice').value) || 0;
            let totalProfit = 0;
            rawData.forEach(item => {
                const buyPrice = parseFloat(item["ราคาต้นทุน/บาท"]) || 0;
                const weight = parseFloat(item["คงเหลือ"]) || 0;
                const profit = (current - buyPrice) * weight;
                totalProfit += profit;
                const diffEl = document.getElementById(`diff-${item["Lot ID"]}`);
                if(diffEl) {
                    diffEl.innerHTML = `<span class="${profit >= 0 ? 'text-emerald-500' : 'text-rose-500'}">${profit >= 0 ? '+' : ''}${Math.round(profit).toLocaleString()}</span>`;
                }
            });
            const pSum = Math.round(totalProfit);
            document.getElementById('totalProfit').innerText = pSum.toLocaleString();
            document.getElementById('profitCard').className = `card p-3 text-center border-b-4 transition-colors ${pSum >= 0 ? 'border-emerald-400 text-emerald-600' : 'border-rose-400 text-rose-600'}`;
        }
        async function submitBuy() {
            const btn = document.getElementById('btnBuy');
            const weight = document.getElementById('buyAmount').value;
            const price = document.getElementById('buyPrice').value;
            const date = document.getElementById('buyDate').value;
            if(!weight || !price || !date) return alert("⚠️ กรุณากรอก วันที่, น้ำหนัก และราคาที่ซื้อ");
            btn.disabled = true; btn.innerText = "⏳ บันทึกข้อมูล...";
            const payload = {
                action: "buy", date: date, amount: weight, detail: document.getElementById('buyDetail').value,
                price: price, fee: document.getElementById('buyFee').value || 0, note: ""
            };
            await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
            alert("✅ บันทึกซื้อทองเรียบร้อย!"); location.reload();
        }
        async function sellPopup(lotId, max) {
            const amount = prompt(`ระบุจำนวนที่ขายจากล็อตนี้ (สูงสุด ${max})`, max);
            if(amount === null || amount === "" || amount <= 0 || amount > max) return;
            const price = prompt(`ระบุราคาที่ขายได้จริงต่อบาท:`, document.getElementById('currentGoldPrice').value);
            if(!price) return;
            if(confirm(`ยืนยันการขาย ${amount} บาท ใช่หรือไม่?`)) {
                const payload = { action: "sell", lotId: lotId, sellAmount: amount, sellPrice: price };
                await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
                alert("✅ บันทึกการขายสำเร็จ!"); location.reload();
            }
        }
        window.onload = loadData;
    </script>
</body>
</html>
