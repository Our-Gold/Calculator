<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gold Smart Tracker v1.9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .gold-bg { background: linear-gradient(135deg, #b45309 0%, #d97706 100%); }
        .card { background: white; border-radius: 1.25rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="text-slate-800">

    <header class="gold-bg text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto flex justify-between items-center max-w-md">
            <h1 class="text-lg font-bold">🟡 GOLD SMART</h1>
            <div class="flex gap-2">
                <button onclick="showPage('index')" class="text-xs px-3 py-2 rounded-lg active:bg-white/20">หน้าแรก</button>
                <button onclick="showPage('form')" class="text-xs bg-white text-amber-800 px-4 py-2 rounded-lg font-bold shadow-sm">เพิ่มข้อมูล</button>
            </div>
        </div>
    </header>

    <main class="container mx-auto p-4 max-w-md space-y-4">
        
        <script>
            // ใส่ URL ของคุณที่นี่
            const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyWO5r9liTWZrcJcjhD9LtgW3f1TW7gTsbct6RnIGfqpxH-7z3ofEIVRBj7fdyN5iru_w/exec";
        </script>

        <div id="page-index" class="space-y-4">
            <section class="card p-5 text-center border-b-4 border-blue-500">
                <h3 class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">ราคาทองปัจจุบัน</h3>
                <input type="number" id="currentGoldPrice" onchange="updatePriceToServer()" oninput="calculateRealtime()" 
                    class="text-4xl font-bold w-full text-center outline-none text-blue-600 bg-blue-50/50 rounded-2xl py-2">
            </section>

            <section class="grid grid-cols-2 gap-3">
                <div class="card p-4 text-center">
                    <h3 class="text-[9px] text-slate-400 font-bold uppercase mb-1">ทองในมือรวม</h3>
                    <div class="text-2xl font-bold text-slate-700"><span id="totalWeight">0.00</span></div>
                </div>
                <div class="card p-4 text-center border-b-4 border-orange-400">
                    <h3 class="text-[9px] text-orange-600 font-bold uppercase mb-1">กำไรรับรู้แล้ว</h3>
                    <div class="text-2xl font-bold text-orange-600"><span id="realizedProfit">0</span></div>
                </div>
            </section>

            <div id="profitCard" class="card p-4 text-center border-b-4 border-slate-300">
                <h3 class="text-[10px] text-slate-400 font-bold uppercase mb-1">กำไรคาดการณ์ (ส่วนที่เหลือ)</h3>
                <div class="text-2xl font-bold"><span id="totalProfit">0.00</span></div>
            </div>

            <div class="flex justify-between items-center px-1 pt-2">
                <h2 class="font-bold text-slate-700">📋 ประวัติล็อตทอง</h2>
                <button onclick="loadData()" class="text-xs font-bold text-blue-600">🔄 รีเฟรช</button>
            </div>
            
            <div id="inventoryContainer" class="space-y-3 pb-10">
                <div class="text-center py-10 text-slate-400 italic">กำลังโหลดข้อมูล...</div>
            </div>
        </div>

        <div id="page-form" class="hidden">
            <div class="card p-6 border border-slate-100">
                <h2 class="text-xl font-bold mb-6 text-emerald-700">➕ บันทึกข้อมูลใหม่</h2>
                <div class="space-y-5">
                    <div>
                        <label class="text-xs font-bold text-slate-500 ml-1">วันที่</label>
                        <input type="date" id="buyDate" class="w-full border-2 border-slate-50 p-4 rounded-2xl outline-none focus:border-emerald-500 bg-slate-50 text-lg">
                    </div>

                    <div>
                        <label class="text-xs font-bold text-slate-500 ml-1">ราคาที่ซื้อบาทละ (ราคาต้นทุน)</label>
                        <input type="number" id="buyPrice" class="w-full border-2 border-slate-50 p-4 rounded-2xl outline-none focus:border-emerald-500 bg-slate-50 text-lg" placeholder="เช่น 35000">
                    </div>

                    <div>
                        <label class="text-xs font-bold text-slate-500 ml-1">น้ำหนักที่ซื้อ (บาท)</label>
                        <input type="number" step="any" id="buyAmount" class="w-full border-2 border-slate-50 p-4 rounded-2xl outline-none focus:border-emerald-500 bg-slate-50 text-lg" placeholder="เช่น 1.00">
                    </div>

                    <div>
                        <label class="text-xs font-bold text-slate-500 ml-1">ค่ากำเหน็จ</label>
                        <input type="number" id="buyFee" class="w-full border-2 border-slate-50 p-4 rounded-2xl outline-none focus:border-emerald-500 bg-slate-50 text-lg" value="0">
                    </div>

                    <div>
                        <label class="text-xs font-bold text-blue-600 ml-1">หมายเหตุ / รายละเอียด</label>
                        <input type="text" id="buyNote" class="w-full border-2 border-blue-50 p-4 rounded-2xl outline-none focus:border-blue-400 bg-blue-50/50 text-lg" placeholder="เช่น แหวน, สร้อย, ทองแท่ง">
                    </div>

                    <button onclick="submitBuy()" id="btnBuy" class="w-full gold-bg text-white py-5 rounded-2xl font-bold shadow-lg active:scale-95 transition mt-4 text-xl">✅ บันทึกข้อมูล</button>
                    <button onclick="showPage('index')" class="w-full text-slate-400 text-sm py-2">ย้อนกลับ</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let rawData = [];
        let rProfit = 0;

        function showPage(page) {
            document.getElementById('page-index').classList.toggle('hidden', page !== 'index');
            document.getElementById('page-form').classList.toggle('hidden', page !== 'form');
            window.scrollTo(0,0);
        }

        async function loadData() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                rawData = data.inventory;
                rProfit = data.realizedProfit;
                document.getElementById('currentGoldPrice').value = data.lastPrice || 0;
                document.getElementById('realizedProfit').innerText = Math.round(rProfit).toLocaleString();
                renderInventory();
            } catch (err) { alert("ดึงข้อมูลไม่สำเร็จ กรุณาลองใหม่"); }
        }

        async function updatePriceToServer() {
            const price = document.getElementById('currentGoldPrice').value;
            fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "savePrice", price: price }) });
        }

        function renderInventory() {
            const container = document.getElementById('inventoryContainer');
            let totalW = 0; container.innerHTML = "";
            
            if (rawData.length === 0) {
                container.innerHTML = `<div class="card p-10 text-center text-slate-400 italic">ไม่มีทองในคลัง</div>`;
                return;
            }

            rawData.forEach(item => {
                const weight = parseFloat(item["คงเหลือ"]) || 0;
                const originalWeight = parseFloat(item["น้ำหนักที่ซื้อ"]) || 0;
                const soldWeight = originalWeight - weight;
                const buyPrice = parseFloat(item["ราคาซื้อ/บาท"]) || 0;
                totalW += weight;

                const card = document.createElement('div');
                card.className = "card p-4 flex justify-between items-center border border-slate-50";
                card.innerHTML = `
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-[9px] bg-slate-100 px-2 py-0.5 rounded text-slate-500 font-bold">${item["Lot ID"]}</span>
                            <span class="text-[10px] text-slate-400">${item["วันที่ซื้อ"]}</span>
                        </div>
                        <h3 class="font-bold text-slate-800 text-sm">${item["หมายเหตุ/รายละเอียด"] || "ไม่มีชื่อ"}</h3>
                        <div class="mt-2 space-y-1">
                            <div class="flex gap-4 text-[10px]">
                                <span class="text-slate-400">ซื้อมา: <b>${originalWeight}</b></span>
                                <span class="text-rose-400">ขายไป: <b>${soldWeight.toFixed(2)}</b></span>
                            </div>
                            <div class="text-blue-600 font-bold text-xs uppercase tracking-tighter">คงเหลือ: ${weight} บาท</div>
                        </div>
                    </div>
                    <div class="flex flex-col items-end gap-2">
                        <div id="diff-${item["Lot ID"]}" class="text-xs font-black">-</div>
                        <button onclick="sellPopup('${item["Lot ID"]}', ${weight})" class="bg-rose-500 text-white px-4 py-1.5 rounded-xl text-[10px] font-bold shadow-sm active:scale-90">ขาย</button>
                    </div>
                `;
                container.appendChild(card);
            });
            document.getElementById('totalWeight').innerText = totalW.toFixed(4);
            calculateRealtime();
        }

        function calculateRealtime() {
            const current = parseFloat(document.getElementById('currentGoldPrice').value) || 0;
            let totalProfit = 0;
            rawData.forEach(item => {
                const buyPrice = parseFloat(item["ราคาซื้อ/บาท"]) || 0;
                const weight = parseFloat(item["คงเหลือ"]) || 0;
                const profit = (current - buyPrice) * weight;
                totalProfit += profit;
                const diffEl = document.getElementById(`diff-${item["Lot ID"]}`);
                if(diffEl) {
                    diffEl.innerHTML = `<span class="${profit >= 0 ? 'text-emerald-500' : 'text-rose-500'}">${profit >= 0 ? '+' : ''}${Math.round(profit).toLocaleString()}</span>`;
                }
            });
            const pSum = Math.round(totalProfit);
            document.getElementById('totalProfit').innerText = pSum.toLocaleString();
            document.getElementById('profitCard').className = `card p-4 text-center border-b-4 transition-colors ${pSum >= 0 ? 'border-emerald-400 text-emerald-600' : 'border-rose-400 text-rose-600'}`;
        }

        async function submitBuy() {
            const btn = document.getElementById('btnBuy');
            const weight = document.getElementById('buyAmount').value;
            const price = document.getElementById('buyPrice').value;
            const date = document.getElementById('buyDate').value;
            
            if(!weight || !price || !date) return alert("กรุณากรอกข้อมูล วันที่, ราคา และน้ำหนัก");
            
            btn.disabled = true; btn.innerText = "⏳ กำลังบันทึก...";
            
            const payload = {
                action: "buy", 
                date: date, 
                amount: weight, 
                price: price, 
                fee: document.getElementById('buyFee').value || 0, 
                note: document.getElementById('buyNote').value
            };
            
            await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
            alert("บันทึกข้อมูลเรียบร้อย!"); location.reload();
        }

        async function sellPopup(lotId, max) {
            const amount = prompt(`ขายจากล็อต ${lotId} (สูงสุด ${max})`, max);
            if(amount === null || amount === "" || amount <= 0 || amount > max) return;
            const price = prompt(`ระบุราคาที่ขายได้ต่อบาท:`, document.getElementById('currentGoldPrice').value);
            if(!price) return;
            
            const payload = { action: "sell", lotId: lotId, sellAmount: amount, sellPrice: price };
            await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
            alert("บันทึกการขายสำเร็จ!"); location.reload();
        }

        window.onload = loadData;
    </script>
</body>
</html>
