<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gold Tracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; -webkit-tap-highlight-color: transparent; }
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <nav class="bg-amber-600 text-white p-3 sticky top-0 z-50 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-lg font-bold flex items-center">🟡 Gold Pro</h1>
            <div class="space-x-1">
                <button onclick="showPage('index')" class="text-sm px-3 py-1.5 rounded-lg active:bg-amber-700">หน้าหลัก</button>
                <button onclick="showPage('form')" class="text-sm bg-white text-amber-700 px-3 py-1.5 rounded-lg font-bold shadow-sm active:bg-gray-100">ซื้อทอง</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-3 max-w-lg">
        
        <script>
            const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyWO5r9liTWZrcJcjhD9LtgW3f1TW7gTsbct6RnIGfqpxH-7z3ofEIVRBj7fdyN5iru_w/exec";
        </script>

        <div id="page-index" class="space-y-3">
            <div class="bg-white p-4 rounded-2xl card-shadow border-t-4 border-blue-500">
                <p class="text-xs text-gray-500 mb-1 text-center font-medium">ราคาทองวันนี้ (จดจำอัตโนมัติ)</p>
                <input type="number" id="currentGoldPrice" onchange="updatePriceToServer()" oninput="calculateRealtime()" 
                    class="text-3xl font-bold w-full text-center outline-none text-blue-600 bg-blue-50 rounded-xl py-2 shadow-inner">
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="bg-white p-3 rounded-2xl card-shadow text-center">
                    <p class="text-[10px] text-gray-500 uppercase font-bold">ทองในมือ</p>
                    <p id="totalWeight" class="text-xl font-bold text-gray-700">0.00</p>
                    <p class="text-[10px] text-gray-400">บาท</p>
                </div>
                <div id="profitCard" class="bg-white p-3 rounded-2xl card-shadow text-center">
                    <p class="text-[10px] text-gray-500 uppercase font-bold">กำไร/ขาดทุน</p>
                    <p id="totalProfit" class="text-xl font-bold">0.00</p>
                    <p class="text-[10px] text-gray-400">บาท</p>
                </div>
            </div>

            <div class="flex justify-between items-center px-1 pt-2">
                <h2 class="font-bold text-gray-700">📦 รายการล็อตทอง</h2>
                <button onclick="loadData()" class="text-xs text-blue-600 font-bold">🔄 รีเฟรชข้อมูล</button>
            </div>
            
            <div id="inventoryContainer" class="space-y-3 pb-20">
                <p class="text-center text-gray-400 py-10 italic">กำลังดึงข้อมูลจาก Google Sheets...</p>
            </div>
        </div>

        <div id="page-form" class="hidden">
            <div class="bg-white p-5 rounded-3xl shadow-xl border border-gray-100">
                <h2 class="text-xl font-bold mb-5 text-emerald-700 border-b pb-2">➕ บันทึกซื้อทอง</h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-xs font-bold text-gray-500">วันที่ซื้อ</label>
                        <input type="date" id="buyDate" class="w-full border-2 border-gray-50 p-3 rounded-xl focus:border-emerald-500 outline-none bg-gray-50">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-xs font-bold text-gray-500">น้ำหนัก (บาท)</label>
                            <input type="number" step="any" id="buyAmount" class="w-full border-2 border-gray-50 p-3 rounded-xl outline-none bg-gray-50" placeholder="0.00">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-500">ค่ากำเหน็จ</label>
                            <input type="number" id="buyFee" class="w-full border-2 border-gray-50 p-3 rounded-xl outline-none bg-gray-50" value="0">
                        </div>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-blue-600">รายละเอียดทอง (เช่น แหวน 1 สลึง)</label>
                        <input type="text" id="buyDetail" class="w-full border-2 border-blue-50 p-3 rounded-xl focus:border-blue-400 outline-none bg-blue-50" placeholder="บันทึกความจำ">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-500">ราคาซื้อ (บาทละ)</label>
                        <input type="number" id="buyPrice" class="w-full border-2 border-gray-50 p-3 rounded-xl outline-none bg-gray-50" placeholder="0.00">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-500">หมายเหตุ</label>
                        <input type="text" id="buyNote" class="w-full border-2 border-gray-50 p-3 rounded-xl outline-none bg-gray-50" placeholder="...">
                    </div>
                    <button onclick="submitBuy()" id="btnBuy" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition transform">✅ บันทึกลงฐานข้อมูล</button>
                    <button onclick="showPage('index')" class="w-full text-gray-400 text-sm py-2">ยกเลิก</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        let rawData = [];

        function showPage(page) {
            document.getElementById('page-index').classList.toggle('hidden', page !== 'index');
            document.getElementById('page-form').classList.toggle('hidden', page !== 'form');
            window.scrollTo(0,0);
        }

        async function loadData() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                rawData = data.inventory;
                document.getElementById('currentGoldPrice').value = data.lastPrice;
                renderInventory();
            } catch (err) {
                alert("เกิดข้อผิดพลาดในการโหลดข้อมูล กรุณาลองใหม่");
            }
        }

        async function updatePriceToServer() {
            const price = document.getElementById('currentGoldPrice').value;
            if(!price) return;
            fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "savePrice", price: price }) });
        }

        function renderInventory() {
            const container = document.getElementById('inventoryContainer');
            let totalW = 0;
            container.innerHTML = "";

            if (rawData.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-gray-400 italic">ไม่พบรายการทองคงเหลือ</div>`;
                return;
            }

            rawData.forEach(item => {
                const weight = parseFloat(item["คงเหลือ"]) || 0;
                const buyPrice = parseFloat(item["ราคาต้นทุน/บาท"]) || 0;
                totalW += weight;
                
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-2xl card-shadow flex justify-between items-center border border-gray-50";
                card.innerHTML = `
                    <div class="flex-1">
                        <div class="flex items-center space-x-2">
                            <span class="text-[10px] bg-gray-100 px-2 py-0.5 rounded text-gray-500 font-bold uppercase">${item["Lot ID"]}</span>
                            <span class="text-xs text-gray-400">${item["วันที่ซื้อ"]}</span>
                        </div>
                        <h3 class="font-bold text-gray-800 my-0.5">${item["รายละเอียด"] || "ไม่ได้ระบุ"}</h3>
                        <div class="flex space-x-4 text-[11px]">
                            <span class="text-gray-500 italic font-medium">ทุน: ${buyPrice.toLocaleString()}</span>
                            <span class="text-blue-600 font-bold">คงเหลือ: ${weight} บาท</span>
                        </div>
                    </div>
                    <div class="text-right flex flex-col items-end">
                        <div id="diff-${item["Lot ID"]}" class="text-sm font-bold mb-2">-</div>
                        <button onclick="sellPopup('${item["Lot ID"]}', ${weight})" class="bg-rose-500 text-white px-4 py-1.5 rounded-xl text-xs font-bold shadow-sm active:bg-rose-600 transition">ขาย</button>
                    </div>
                `;
                container.appendChild(card);
            });
            document.getElementById('totalWeight').innerText = totalW.toFixed(4);
            calculateRealtime();
        }

        function calculateRealtime() {
            const current = parseFloat(document.getElementById('currentGoldPrice').value) || 0;
            let totalProfit = 0;
            
            rawData.forEach(item => {
                const buyPrice = parseFloat(item["ราคาต้นทุน/บาท"]) || 0;
                const weight = parseFloat(item["คงเหลือ"]) || 0;
                const profit = (current - buyPrice) * weight;
                totalProfit += profit;
                
                const diffEl = document.getElementById(`diff-${item["Lot ID"]}`);
                if(diffEl) {
                    diffEl.innerHTML = `<span class="${profit >= 0 ? 'text-emerald-500' : 'text-rose-500'}">${profit >= 0 ? '+' : ''}${Math.round(profit).toLocaleString()}</span>`;
                }
            });

            const profitEl = document.getElementById('totalProfit');
            profitEl.innerText = Math.round(totalProfit).toLocaleString();
            document.getElementById('profitCard').className = `bg-white p-3 rounded-2xl card-shadow text-center border-b-4 ${totalProfit >= 0 ? 'border-emerald-400 text-emerald-600' : 'border-rose-400 text-rose-600'}`;
        }

        async function submitBuy() {
            const btn = document.getElementById('btnBuy');
            const weight = document.getElementById('buyAmount').value;
            const price = document.getElementById('buyPrice').value;
            const date = document.getElementById('buyDate').value;

            if(!weight || !price || !date) return alert("กรุณากรอก วันที่, น้ำหนัก และราคาให้ครบ");

            btn.disabled = true; btn.innerText = "⏳ กำลังบันทึกข้อมูล...";
            const payload = {
                action: "buy",
                date: date,
                amount: weight,
                detail: document.getElementById('buyDetail').value,
                price: price,
                fee: document.getElementById('buyFee').value || 0,
                note: document.getElementById('buyNote').value
            };

            await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
            alert("✅ บันทึกซื้อทองเรียบร้อย!");
            location.reload();
        }

        async function sellPopup(lotId, max) {
            const amount = prompt(`ระบุจำนวนที่ขายจากล็อตนี้ (สูงสุด ${max})`, max);
            if(amount === null || amount === "" || amount <= 0 || amount > max) return;
            const price = prompt(`ระบุราคาที่ขายได้จริงต่อบาท:`, document.getElementById('currentGoldPrice').value);
            if(!price) return;

            if(confirm(`ยืนยันการขาย ${amount} บาท จากล็อต ${lotId}?`)) {
                const payload = { action: "sell", lotId: lotId, sellAmount: amount, sellPrice: price };
                await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
                alert("✅ บันทึกการขายสำเร็จ!");
                location.reload();
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
